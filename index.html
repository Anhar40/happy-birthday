<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD 14 Mei - My Sincere Heart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fff5f7; }
        .font-romance { font-family: 'Dancing Script', cursive; }
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 192, 203, 0.5); 
        }
        .floating-hearts { position: fixed; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; z-index: 0; }
        #typingText p { min-height: 1.5em; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div class="floating-hearts" id="heartContainer"></div>
    
    <!-- Elemen Musik -->
    <audio id="bgMusic" loop>
        <source src="coba.mp3" type="audio/mpeg">
    </audio>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6 text-center">
        
        <!-- Section 1: Intro -->
        <div id="section1" class="animate__animated animate__fadeIn">
            <h1 class="text-pink-500 font-romance text-5xl md:text-7xl mb-4">Selamat Ulang Tahun...</h1>
            <p class="text-gray-600 italic text-lg mb-8">Aku punya sesuatu yang ingin aku tunjukkan padamu.</p>
            
            <div id="giftBox" class="relative inline-block cursor-pointer group">
                <div class="text-9xl filter drop-shadow-2xl animate__animated animate__bounce animate__infinite animate__slow">🎁</div>
                <div class="absolute -top-4 -right-4 bg-red-500 text-white text-xs px-2 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">Buka aku</div>
            </div>
        </div>

        <!-- Section 2: Konten Utama -->
        <div id="section2" class="hidden w-full max-w-2xl glass p-8 rounded-[2rem] shadow-2xl">
            
            <div class="relative w-48 h-48 md:w-64 md:h-64 mx-auto mb-6 rounded-full border-8 border-pink-200 overflow-hidden shadow-lg transform transition hover:scale-105">
                <img src="foto.jpg" alt="Birthday Girl" class="w-full h-full object-cover">
            </div>

            <div id="mainContent" class="space-y-4">
                <h2 class="text-3xl font-romance text-pink-600">Selamat Ulang Tahun, Cantik! ❤️</h2>
                
                <!-- Area Teks Mengetik -->
                <div id="typingText" class="text-gray-700 text-sm md:text-base leading-relaxed text-left space-y-3">
                    <p id="line1" class="text-center font-bold text-pink-400"></p>
                    <p id="line2"></p>
                    <p id="line3"></p>
                    <p id="line4" class="font-bold text-pink-500 text-center text-lg italic"></p>
                </div>

                <div id="actionBtns" class="mt-8 flex flex-col gap-3 opacity-0 transition-opacity duration-1000">
                    <button id="yesBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all active:scale-95">
                        Iya, Ayo Bicara Lagi ❤️
                    </button>
                    <button id="noBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-600 text-xs py-2 px-4 rounded-full transition-all mt-2 shadow-sm">
    Nanti Saja
</button>
                </div>
            </div>

            <!-- Pesan Setelah Klik Iya -->
            <div id="finalMessage" class="hidden animate__animated animate__heartBeat">
                <h2 class="text-4xl font-romance text-pink-600 mb-4">Terima Kasih! ❤️</h2>
                <p class="text-gray-700 italic">"Aku tunggu kabar darimu ya. See you soon!"</p>
            </div>
        </div>
    </main>

    <script>
        const giftBox = document.getElementById('giftBox');
        const yesBtn = document.getElementById('yesBtn');
        const music = document.getElementById('bgMusic');

        // Data teks untuk efek mengetik
        const messages = [
            { id: 'line1', text: '"May your day be as beautiful as your smile."' },
            { id: 'line2', text: 'Melihat foto ini, aku sadar betapa berartinya kamu bagiku. Selamat ulang tahun yang ke-22 untuk wanita luar biasa yang lahir pada 14 Mei 2004.' },
            { id: 'line3', text: 'Lewat web ini, aku ingin jujur. Aku minta maaf atas semua ego dan salahku dulu. Setiap detik tanpamu rasanya ada yang hilang.' },
            { id: 'line4', text: '"Maukah kamu memberiku satu kesempatan lagi untuk memperbaikinya?"' }
        ];

        async function typeWriter(text, elementId, speed = 50) {
            const element = document.getElementById(elementId);
            for (let i = 0; i < text.length; i++) {
                element.innerHTML += text.charAt(i);
                await new Promise(resolve => setTimeout(resolve, speed));
            }
        }

        giftBox.addEventListener('click', async function() {
            music.play().catch(e => console.log("Musik diputar"));

            document.getElementById('section1').classList.add('hidden');
            document.getElementById('section2').classList.remove('hidden');
            document.getElementById('section2').classList.add('animate__animated', 'animate__zoomIn');

            // Mulai efek mengetik satu per satu
            for (const msg of messages) {
                await typeWriter(msg.text, msg.id, 40);
                await new Promise(resolve => setTimeout(resolve, 500)); // Jeda antar baris
            }

            // Munculkan tombol setelah mengetik selesai
            document.getElementById('actionBtns').classList.remove('opacity-0');
        });

        yesBtn.addEventListener('click', () => {
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('finalMessage').classList.remove('hidden');
            for(let i=0; i<20; i++) setTimeout(createHeart, i * 100);
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('fixed', 'text-pink-300', 'animate__animated', 'animate__fadeOutUp');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('heartContainer').appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
        setInterval(createHeart, 500);

        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('mouseover', () => {
            noBtn.style.position = 'absolute';
            noBtn.style.top = Math.random() * 80 + '%';
            noBtn.style.left = Math.random() * 80 + '%';
        });
    </script>
</body>
</html>
